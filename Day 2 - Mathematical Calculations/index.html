<!DOCTYPE html>
<html>
<head>
  <title>Tip Split Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>💸 Tip Split Calculator</h1>
    <p>Split the bill fairly in seconds.</p>

    <input id="bill" type="number" placeholder="Total bill amount">
    <input id="tip" type="number" placeholder="Tip percentage e.g. 10, 12, 15">
    <input id="people" type="number" placeholder="Number of people">

    <button onclick="calculateTip()">Calculate</button>

    <h2 id="result"></h2>
  </main>

  <script src="script.js"></script>
</body>
</html>
